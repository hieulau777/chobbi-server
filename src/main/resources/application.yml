server:
  port: 9090

spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3307/chobbi}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:admin123}

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms
      password: ${REDIS_PASSWORD:admin123redis}
    mongodb:
      uri: ${MONGODB_URI:mongodb://root:admin123mongo@localhost:27017/chobbi?authSource=admin}

  servlet:
    multipart:
      max-file-size: 11MB
      max-request-size: 120MB

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-long-enough}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
file:
  root-path: ${FILE_ROOT_PATH:/Users/matthew777/Desktop/spring-upload-demo}
  base-domain: ${FILE_BASE_DOMAIN:http://localhost:9090/static}